# Example values for a non-Java service: a React static build served by
# nginx. Shows a minimal, idiomatic config for a service that needs none of
# the Java-specific fields (javaOpts, jmx) and none of the OCI-specific
# fields. Use with:
#   helm template web-frontend ./common-service-chart -f values-example.yaml

serviceName: web-frontend
serviceVersion: "2.3.1"
image: registry.example.com/web-frontend:2.3.1
replicas: 2

service:
  type: ClusterIP
  containerPort: 8080
  portBlock:
    - name: web
      port: 80
      protocol: TCP

# No JMX, no JAVA_OPTS, no custom command/args needed — nginx's own
# ENTRYPOINT/CMD from the base image is used as-is.

env:
  - name: NODE_ENV
    value: production

healthCheck:
  livenessPath: /health
  readinessPath: /health
  liveness:
    initialDelaySeconds: 10
    periodSeconds: 30
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10

resources:
  limits:
    cpu: "500m"
    memory: "256Mi"
  requests:
    cpu: "50m"
    memory: "64Mi"

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: app.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - app.example.com
      secretName: web-frontend-tls

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 75
