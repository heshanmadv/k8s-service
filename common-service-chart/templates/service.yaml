apiVersion: v1
kind: Service
metadata:
  name: {{ include "common-service-chart.serviceName" . }}
  labels:
    {{- include "common-service-chart.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "common-service-chart.selectorLabels" . | nindent 4 }}
  ports:
    {{- /*
    Sentinel: service.port == 30000 means "let Kubernetes auto-assign the
    nodePort" (port block rendered without nodePort). Any other value is an
    explicit nodePort request. Mirrors the original module's
    `var.service_port == 30000` switch between the two dynamic "port" blocks.
    */ -}}
    {{- if eq (int .Values.service.port) 30000 }}
    {{- range .Values.service.portBlock }}
    - name: {{ .name }}
      protocol: {{ .protocol }}
      port: {{ .port }}
      targetPort: {{ $.Values.service.containerPort }}
    {{- end }}
    {{- else }}
    {{- range .Values.service.portBlock }}
    - name: {{ .name }}
      protocol: {{ .protocol }}
      port: {{ .port }}
      targetPort: {{ $.Values.service.containerPort }}
      nodePort: {{ $.Values.service.port }}
    {{- end }}
    {{- end }}
    {{- if .Values.debug.enabled }}
    {{- range .Values.debug.containerPort }}
    - name: {{ .name }}
      protocol: {{ .protocol }}
      port: {{ .port }}
      targetPort: {{ .targetPort }}
    {{- end }}
    {{- end }}
    - name: monitoring
      protocol: TCP
      port: {{ .Values.monitoring.port }}
      targetPort: {{ .Values.monitoring.port }}
    {{- if .Values.jmx.enabled }}
    - name: jmx
      protocol: TCP
      port: {{ .Values.jmx.port }}
      targetPort: {{ .Values.jmx.port }}
    {{- end }}
